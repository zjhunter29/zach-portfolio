<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 880" width="720" height="880" role="img">
  
  <defs>
    <linearGradient id="bg-pt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c18"/>
      <stop offset="1" stop-color="#04040a"/>
    </linearGradient>
    <radialGradient id="ga-pt" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb-pt" cx="0.85" cy="0.9" r="0.9">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt-pt" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
    <filter id="blur-pt"><feGaussianBlur stdDeviation="42"/></filter>
    <filter id="grain-pt">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.045"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <rect width="720" height="880" fill="url(#bg-pt)"/>
  <rect width="720" height="880" fill="url(#ga-pt)" filter="url(#blur-pt)"/>
  <rect width="720" height="880" fill="url(#gb-pt)" filter="url(#blur-pt)"/>
  <g transform="translate(360 250)" opacity="0.92">
    <circle cx="0" cy="0" r="120" fill="#0c0d18" stroke="url(#txt-pt)" stroke-width="3"/>
    <path d="M -90 360 C -90 200 -45 150 0 150 C 45 150 90 200 90 360 Z" fill="#0c0d18" stroke="url(#txt-pt)" stroke-width="3"/>
    <circle cx="0" cy="-10" r="60" fill="#5b8cff" fill-opacity="0.18"/>
  </g>
  <text x="360" y="760" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-size="60" font-weight="800" fill="url(#txt-pt)" text-anchor="middle" font-style="italic">Zach</text>
  <text x="360" y="806" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-size="16" letter-spacing="5" font-weight="600" fill="#8a8d9f" text-anchor="middle">PORTRAIT PLACEHOLDER</text>
  <rect width="720" height="880" filter="url(#grain-pt)" opacity="0.5"/></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" role="img">
  
  <defs>
    <linearGradient id="bg-p11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c18"/>
      <stop offset="1" stop-color="#04040a"/>
    </linearGradient>
    <radialGradient id="ga-p11" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb-p11" cx="0.85" cy="0.9" r="0.9">
      <stop offset="0" stop-color="#2b50ff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#2b50ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt-p11" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/>

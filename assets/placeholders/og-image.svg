<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img">
  
  <defs>
    <linearGradient id="bg-og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c18"/>
      <stop offset="1" stop-color="#04040a"/>
    </linearGradient>
    <radialGradient id="ga-og" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb-og" cx="0.85" cy="0.9" r="0.9">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt-og" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
    <filter id="blur-og"><feGaussianBlur stdDeviation="42"/></filter>
    <filter id="grain-og">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.045"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-og)"/>
  <rect width="1200" height="630" fill="url(#ga-og)" filter="url(#blur-og)"/>
  <rect width="1200" height="630" fill="url(#gb-og)" filter="url(#blur-og)"/>
  <text x="80" y="250" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-size="38" letter-spacing="6" font-weight="600" fill="#5b8cff">ZACH — CREATIVE STUDIO</text>
  <text x="76" y="370" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-size="118" font-weight="800" fill="#f4f5fa">Bringing Ideas</text>
  <text x="76" y="478" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-size="118" font-weight="800" fill="url(#txt-og)">to Life.</text>
  <text x="80" y="556" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="500" fill="#c7c9d6">Video Editing · Graphic Design · UX Design</text>
  <rect width="1200" height="630" filter="url(#grain-og)" opacity="0.5"/></svg>
